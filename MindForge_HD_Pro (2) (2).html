<!DOCTYPE html>
<html><head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindForge — Editor de Mapas Mentales</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0a1a;--bg2:#110f24;--bg3:#1a1830;--bg4:#252340;
  --brd:rgba(99,102,241,.12);--brd2:rgba(99,102,241,.2);
  --tx:#e2e0f0;--tx2:#b4b0d0;--tx3:#6b6990;--tx4:#4a4870;
  --accent:#6366f1;--accent2:#c4b5fd;--accent-dim:rgba(99,102,241,.08);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif}

/* ── Layout ── */
.app{display:flex;height:100vh;width:100vw}

/* ── Sidebar ── */
.sidebar{width:270px;background:linear-gradient(180deg,var(--bg2),var(--bg));border-right:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0;z-index:20;user-select:none}
.sidebar-head{padding:18px 16px 14px;border-bottom:1px solid var(--brd)}
.logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--accent2)}
.logo-ico{width:30px;height:30px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px}
.sb-sec{padding:12px 16px;border-bottom:1px solid rgba(99,102,241,.06)}
.sb-title{font-size:9px;text-transform:uppercase;letter-spacing:1.4px;color:var(--tx3);margin-bottom:8px;font-family:'JetBrains Mono',monospace}
.sb-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;background:0 0;border:1px solid transparent;border-radius:9px;color:var(--tx2);font-family:'Outfit',sans-serif;font-size:12.5px;cursor:pointer;transition:.15s;text-align:left}
.sb-btn:hover{background:var(--accent-dim);border-color:rgba(99,102,241,.15);color:var(--tx)}
.sb-btn .ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;background:rgba(99,102,241,.1);flex-shrink:0}

/* Color palette */
.palette{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.cdot{width:100%;aspect-ratio:1;border-radius:9px;cursor:pointer;border:2px solid transparent;transition:.15s;display:flex;align-items:center;justify-content:center;position:relative}
.cdot:hover{transform:scale(1.12);border-color:rgba(255,255,255,.3)}
.cdot.active{border-color:#fff;box-shadow:0 0 10px rgba(255,255,255,.2)}
.cdot .cn{font-size:7.5px;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.85);text-align:center;line-height:1.1}

.sb-foot{margin-top:auto;padding:12px 16px;border-top:1px solid rgba(99,102,241,.06);font-size:10px;color:var(--tx4);font-family:'JetBrains Mono',monospace;line-height:1.7}

/* ── Canvas Area ── */
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg)}

/* Top bar */
.topbar{position:absolute;top:12px;left:12px;right:12px;display:flex;align-items:center;justify-content:space-between;z-index:10;pointer-events:none}
.topbar>*{pointer-events:auto}
.map-input{background:rgba(17,15,36,.85);backdrop-filter:blur(10px);border:1px solid var(--brd);border-radius:11px;padding:9px 14px;color:var(--tx);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;outline:0;min-width:190px}
.map-input:focus{border-color:rgba(99,102,241,.4)}
.top-acts{display:flex;gap:5px}
.top-btn{background:rgba(17,15,36,.85);backdrop-filter:blur(10px);border:1px solid var(--brd);border-radius:9px;padding:7px 12px;color:var(--tx2);font-family:'Outfit',sans-serif;font-size:11.5px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.15s}
.top-btn:hover{background:rgba(17,15,36,.95);border-color:var(--brd2);color:var(--tx)}

/* SVG canvas */
#canvas{width:100%;height:100%;cursor:grab}
#canvas.grabbing{cursor:grabbing}
#canvas.connecting{cursor:crosshair}

/* Grid pattern */
.grid-line{stroke:rgba(30,27,58,.6);stroke-width:1}

/* Edges */
.edge{stroke:var(--accent);stroke-width:2.5;fill:none;pointer-events:stroke;cursor:pointer}
.edge:hover{stroke:#818cf8;stroke-width:3.5}
.edge-temp{stroke:var(--accent);stroke-width:2;stroke-dasharray:8 4;fill:none;opacity:.6}

/* Nodes */
.node-group{cursor:grab}
.node-group.dragging{cursor:grabbing}
.node-rect{rx:14;ry:14;filter:url(#nodeShadow)}
.node-rect.root{rx:18;ry:18}
.node-text{font-family:'Outfit',sans-serif;font-weight:500;fill:#fff;text-anchor:middle;dominant-baseline:central;pointer-events:none;font-size:13px}
.node-text.root{font-size:15px}

/* Handles (connection points) */
.handle{fill:var(--accent);stroke:var(--bg3);stroke-width:2;r:5;opacity:0;transition:opacity .2s;cursor:crosshair}
.node-group:hover .handle{opacity:1}

/* Node selected ring */
.sel-ring{fill:none;stroke:rgba(255,255,255,.3);stroke-width:3;rx:16;ry:16;pointer-events:none}

/* ── Context Menu ── */
.ctx{position:fixed;background:var(--bg3);border:1px solid var(--brd2);border-radius:13px;padding:5px;min-width:175px;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:100;animation:ctxIn .12s ease}
@keyframes ctxIn{from{opacity:0;transform:scale(.95) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ctx-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 11px;background:0 0;border:0;border-radius:9px;color:var(--tx2);font-family:'Outfit',sans-serif;font-size:12.5px;cursor:pointer;transition:.12s;text-align:left}
.ctx-btn:hover{background:rgba(99,102,241,.12);color:var(--tx)}
.ctx-btn.danger:hover{background:rgba(239,68,68,.12);color:#fca5a5}
.ctx-sep{height:1px;background:rgba(99,102,241,.1);margin:3px 7px}
.ctx-colors{display:flex;gap:4px;padding:5px 11px;flex-wrap:wrap}
.ctx-cdot{width:20px;height:20px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:.12s}
.ctx-cdot:hover{border-color:rgba(255,255,255,.5);transform:scale(1.15)}

/* ── MiniMap ── */
.minimap{position:absolute;bottom:48px;right:12px;width:160px;height:110px;background:var(--bg2);border:1px solid var(--brd);border-radius:11px;overflow:hidden;z-index:10}
.minimap-viewport{fill:none;stroke:var(--accent);stroke-width:1.5;opacity:.5}

/* ── Status bar ── */
.status{height:30px;background:var(--accent-dim);display:flex;align-items:center;justify-content:space-between;padding:0 14px;font-size:10.5px;color:var(--tx4);position:absolute;bottom:0;left:0;right:0;z-index:10}
.sdot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:5px;background:#10b981;box-shadow:0 0 6px #10b981}

/* ── Toast ── */
.toast{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--brd2);border-radius:11px;padding:10px 18px;color:var(--accent2);font-size:12.5px;font-family:'Outfit',sans-serif;box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:200;animation:tIn .25s ease,tOut .25s ease 2.5s forwards;pointer-events:none}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}}
@keyframes tOut{to{opacity:0;transform:translateX(-50%) translateY(12px)}}

/* ── Modal ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:150;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}}
.modal-box{background:var(--bg3);border:1px solid var(--brd2);border-radius:16px;padding:22px;width:400px;max-height:75vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-title{font-size:17px;font-weight:600;color:var(--accent2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.modal-close{margin-left:auto;background:0 0;border:0;color:var(--tx3);font-size:17px;cursor:pointer;padding:3px 7px;border-radius:7px}
.modal-close:hover{background:var(--accent-dim);color:var(--tx)}
.file-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:9px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);margin-bottom:7px;cursor:pointer;transition:.15s}
.file-item:hover{background:var(--accent-dim);border-color:var(--brd2)}
.file-name{font-size:12.5px;font-weight:500;color:var(--tx)}
.file-date{font-size:10px;color:var(--tx3)}

/* ── Inline editor ── */
.inline-edit{position:fixed;z-index:100;background:var(--bg3);border:2px solid var(--accent);border-radius:10px;padding:8px 14px;color:var(--tx);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;outline:0;min-width:120px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.4)}

/* Zoom controls */
.zoom-ctrl{position:absolute;bottom:48px;left:12px;display:flex;flex-direction:column;gap:2px;z-index:10}
.zoom-btn{width:34px;height:34px;background:var(--bg3);border:1px solid var(--brd);color:var(--tx2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.zoom-btn:first-child{border-radius:10px 10px 0 0}
.zoom-btn:last-child{border-radius:0 0 10px 10px}
.zoom-btn:hover{background:var(--bg4);color:var(--tx)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,.2);border-radius:3px}

</style>

<style id="claude-agent-animation-styles">
      @keyframes claude-pulse {
        0% {
          box-shadow: 
            inset 0 0 10px rgba(217, 119, 87, 0.5),
            inset 0 0 20px rgba(217, 119, 87, 0.3),
            inset 0 0 30px rgba(217, 119, 87, 0.1);
        }
        50% {
          box-shadow: 
            inset 0 0 15px rgba(217, 119, 87, 0.7),
            inset 0 0 25px rgba(217, 119, 87, 0.5),
            inset 0 0 35px rgba(217, 119, 87, 0.2);
        }
        100% {
          box-shadow: 
            inset 0 0 10px rgba(217, 119, 87, 0.5),
            inset 0 0 20px rgba(217, 119, 87, 0.3),
            inset 0 0 30px rgba(217, 119, 87, 0.1);
        }
      }
    </style></head>

<div class="app">
  <div class="sidebar" style="overflow-y: auto; max-height: 100vh;">

    <button class="sb" onclick="MF.printHDLight()" style="background:linear-gradient(135deg,#d97706,#ea580c);border:1px solid rgba(217,119,6,0.3)">🖨️ Imprimir Pro (Claro)</button>
    <button class="sb" onclick="MF.printHDDark()" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);border:1px solid rgba(99,102,241,0.3)">🖨️ Imprimir Pro (Oscuro)</button>

    <div class="sb-foot">

  <div>

    <button class="sb" onclick="MF.exportPNG()" style="background: linear-gradient(135deg, #4f46e5, #7c3aed); border: 1px solid rgba(99,102,241,0.3); color: white; font-weight: 600;">
      🌙 PNG HD Oscuro (5x)
    </button>

      ☀️ PNG HD Claro (5x)
    </button>
    <button class="sb" onclick="MF.printHDLight()" style="background: linear-gradient(135deg, #d97706, #ea580c); border: 1px solid rgba(217,119,6,0.3); color: white; font-weight: 600;">
      🖨️ Imprimir Profesional (Claro)
    </button>
    <button class="sb" onclick="MF.printHDDark()" style="background: linear-gradient(135deg, #6366f1, #8b5cf6); border: 1px solid rgba(99,102,241,0.3); color: white; font-weight: 600;">
      🖨️ Imprimir Profesional (Oscuro)
    </button>
  </div></div>
  <div class="canvas-wrap" id="canvasWrap">
    <div class="topbar">
      <input class="map-input" id="mapTitle" value="Mi Mapa Mental" placeholder="Nombre del mapa...">

<script>


// ─── MindForge Engine ──────────────────────────────────────────────────────
const MF = (() => {

const COLORS = [
  {name:'Violeta',bg:'#7c3aed',border:'#6d28d9',text:'#f5f3ff'},
  {name:'Índigo',bg:'#4f46e5',border:'#4338ca',text:'#eef2ff'},
  {name:'Azul',bg:'#2563eb',border:'#1d4ed8',text:'#eff6ff'},
  {name:'Esmeralda',bg:'#059669',border:'#047857',text:'#ecfdf5'},
  {name:'Ámbar',bg:'#d97706',border:'#b45309',text:'#fffbeb'},
  {name:'Rosa',bg:'#db2777',border:'#be185d',text:'#fdf2f8'},
  {name:'Rojo',bg:'#dc2626',border:'#b91c1c',text:'#fef2f2'},
  {name:'Slate',bg:'#475569',border:'#334155',text:'#f8fafc'},
];

let nodes = [];
let edges = [];
let selectedNode = null;
let selectedColor = 0;
let dragNode = null;
let dragOffset = {x:0,y:0};
let connecting = null; // {nodeId, handlePos}
let idCounter = Date.now();

// View transform
let vx = 0, vy = 0, vScale = 1;
let isPanning = false;
let panStart = {x:0,y:0};
let panStartView = {x:0,y:0};

const svg = () => document.getElementById('canvas');
const edgesLayer = () => document.getElementById('edgesLayer');
const nodesLayer = () => document.getElementById('nodesLayer');
const wrap = () => document.getElementById('canvasWrap');

// ── Init ──
function init() {
  buildPalette();
  setupEvents();
  loadDefault();
  render();
  requestAnimationFrame(() => fitView());
}

function loadDefault() {
      const lastKey = localStorage.getItem('mindforge_last');
      if (lastKey) {
        try {
          const data = JSON.parse(localStorage.getItem(lastKey));
          if (data && data.nodes && data.nodes.length > 0) {
            const normalized = normalizeMapData(data);
            if (normalized.nodes.length > 0) {
              nodes = normalized.nodes;
              edges = normalized.edges;
              document.getElementById('mapTitle').value = data.title || data.name || 'Mi Mapa Mental';
              return;
            }
          }
        } catch(e) { console.warn('loadDefault error:', e); }
      }
      nodes = [
        {id:'root',x:400,y:300,label:'Mi Mapa Mental',color:0,isRoot:true,w:180,h:50},
        {id:'n1',x:120,y:100,label:'Idea 1',color:2,w:120,h:40},
        {id:'n2',x:680,y:100,label:'Idea 2',color:4,w:120,h:40},
        {id:'n3',x:120,y:500,label:'Idea 3',color:3,w:120,h:40},
        {id:'n4',x:680,y:500,label:'Idea 4',color:5,w:120,h:40},
      ];
      edges = [
        {id:'e1',from:'root',to:'n1'},
        {id:'e2',from:'root',to:'n2'},
        {id:'e3',from:'root',to:'n3'},
        {id:'e4',from:'root',to:'n4'},
      ];
    }

    function normalizeMapData(data) {
      var resultNodes = [];
      var resultEdges = [];
      if (data.nodes && data.nodes.length > 0) {
        var sample = data.nodes[0];
        if (sample.position && sample.data && sample.data.label !== undefined) {
          resultNodes = data.nodes.map(function(n) {
            return {
              id: n.id,
              x: n.position.x + (n.data && n.data.width ? n.data.width / 2 : 60),
              y: n.position.y + (n.data && n.data.height ? n.data.height / 2 : 20),
              label: n.data.label || 'Nodo',
              color: typeof n.data.colorIndex === 'number' ? n.data.colorIndex : 0,
              isRoot: !!n.data.isRoot,
              w: n.data.isRoot ? 180 : 120,
              h: n.data.isRoot ? 50 : 40
            };
          });
        } else if (sample.x !== undefined && sample.label !== undefined) {
          resultNodes = data.nodes;
        }
      }
      if (data.edges && data.edges.length > 0) {
        var sampleEdge = data.edges[0];
        if (sampleEdge.source !== undefined && sampleEdge.target !== undefined) {
          resultEdges = data.edges.map(function(e) {
            return {
              id: e.id || ('e_' + Math.random().toString(36).substr(2, 9)),
              from: e.source,
              to: e.target
            };
          });
        } else if (sampleEdge.from !== undefined && sampleEdge.to !== undefined) {
          resultEdges = data.edges;
        }
      }
      return { nodes: resultNodes, edges: resultEdges };
    }

    // ── Coordinate transforms ──
function screenToWorld(sx, sy) {
  const r = wrap().getBoundingClientRect();
  return {x: (sx - r.left - vx) / vScale, y: (sy - r.top - vy) / vScale};
}

function worldToScreen(wx, wy) {
  const r = wrap().getBoundingClientRect();
  return {x: wx * vScale + vx + r.left, y: wy * vScale + vy + r.top};
}

function applyTransform() {
  const g = svg().querySelector('#edgesLayer');
  const n = svg().querySelector('#nodesLayer');
  const bg = svg().querySelector('#gridBg');
  const t = `translate(${vx},${vy}) scale(${vScale})`;
  g.setAttribute('transform', t);
  n.setAttribute('transform', t);
  bg.setAttribute('transform', t);
  document.getElementById('tempEdge').setAttribute('transform', t);
  updateMinimap();
}

// ── Render ──
function render() {
  renderEdges();
  renderNodes();
  updateStats();
  updateMinimap();
}

function renderEdges() {
  const layer = edgesLayer();
  layer.innerHTML = '';
  edges.forEach(e => {
    const from = nodes.find(n => n.id === e.from);
    const to = nodes.find(n => n.id === e.to);
    if (!from || !to) return;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', from.x);
    line.setAttribute('y1', from.y);
    line.setAttribute('x2', to.x);
    line.setAttribute('y2', to.y);
    line.classList.add('edge');
    line.dataset.edgeId = e.id;
    line.addEventListener('contextmenu', ev => {
      ev.preventDefault();
      ev.stopPropagation();
      showEdgeCtx(ev, e.id);
    });
    layer.appendChild(line);
  });
}

function renderNodes() {
  const layer = nodesLayer();
  layer.innerHTML = '';
  nodes.forEach(n => {
    const c = COLORS[n.color] || COLORS[0];
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.classList.add('node-group');
    g.dataset.nodeId = n.id;

    // Measure text to size node
    const textLen = n.label.length;
    const w = Math.max(n.isRoot ? 160 : 110, textLen * 8 + 36);
    const h = n.isRoot ? 50 : 40;
    n.w = w; n.h = h;

    // Selection ring
    if (selectedNode === n.id) {
      const ring = document.createElementNS('http://www.w3.org/2000/svg','rect');
      ring.setAttribute('x', n.x - w/2 - 4);
      ring.setAttribute('y', n.y - h/2 - 4);
      ring.setAttribute('width', w + 8);
      ring.setAttribute('height', h + 8);
      ring.classList.add('sel-ring');
      g.appendChild(ring);
    }

    // Node body
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', n.x - w/2);
    rect.setAttribute('y', n.y - h/2);
    rect.setAttribute('width', w);
    rect.setAttribute('height', h);
    rect.classList.add('node-rect');
    if (n.isRoot) rect.classList.add('root');
    rect.setAttribute('fill', c.bg);
    rect.setAttribute('stroke', c.border);
    rect.setAttribute('stroke-width', '2');
    g.appendChild(rect);

    // Label
    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', n.x);
    text.setAttribute('y', n.y);
    text.classList.add('node-text');
    if (n.isRoot) text.classList.add('root');
    text.setAttribute('fill', c.text);
    text.textContent = n.label;
    g.appendChild(text);

    // Handles (top, right, bottom, left)
    const handlePositions = [
      {cx: n.x, cy: n.y - h/2, pos:'top'},
      {cx: n.x + w/2, cy: n.y, pos:'right'},
      {cx: n.x, cy: n.y + h/2, pos:'bottom'},
      {cx: n.x - w/2, cy: n.y, pos:'left'},
    ];
    handlePositions.forEach(hp => {
      const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx', hp.cx);
      circle.setAttribute('cy', hp.cy);
      circle.setAttribute('r', '5');
      circle.classList.add('handle');
      circle.dataset.nodeId = n.id;
      circle.dataset.handlePos = hp.pos;
      circle.addEventListener('mousedown', ev => {
        ev.stopPropagation();
        startConnect(n.id, hp);
      });
      g.appendChild(circle);
    });

    // Events
    g.addEventListener('mousedown', ev => {
      if (ev.target.classList.contains('handle')) return;
      ev.stopPropagation();
      startDrag(n.id, ev);
    });
    g.addEventListener('dblclick', ev => {
      ev.stopPropagation();
      editNodeLabel(n.id, ev);
    });
    g.addEventListener('contextmenu', ev => {
      ev.preventDefault();
      ev.stopPropagation();
      showNodeCtx(ev, n.id);
    });
    g.addEventListener('click', ev => {
      ev.stopPropagation();
      selectNode(n.id);
    });

    layer.appendChild(g);
  });
}

function updateStats() {
  document.getElementById('stats').textContent = `Nodos: ${nodes.length} · Ramas: ${edges.length}`;
  document.getElementById('statusRight').textContent = `${nodes.length} nodos · ${edges.length} conexiones · ${Math.round(vScale*100)}%`;
}

// ── Node selection ──
function selectNode(id) {
  selectedNode = id;
  const n = nodes.find(n => n.id === id);
  if (n) selectedColor = n.color;
  updatePaletteUI();
  render();
}

function deselectAll() {
  selectedNode = null;
  render();
  hideCtx();
}

// ── Dragging ──
function startDrag(nodeId, ev) {
  const n = nodes.find(n => n.id === nodeId);
  if (!n) return;
  dragNode = nodeId;
  const wp = screenToWorld(ev.clientX, ev.clientY);
  dragOffset = {x: wp.x - n.x, y: wp.y - n.y};
  selectNode(nodeId);
  svg().classList.add('grabbing');
}

function onDrag(ev) {
  if (!dragNode) return;
  const n = nodes.find(n => n.id === dragNode);
  if (!n) return;
  const wp = screenToWorld(ev.clientX, ev.clientY);
  n.x = wp.x - dragOffset.x;
  n.y = wp.y - dragOffset.y;
  render();
}

function endDrag() {
  dragNode = null;
  svg().classList.remove('grabbing');
}

// ── Connecting ──
function startConnect(nodeId, handleInfo) {
  connecting = {nodeId, cx: handleInfo.cx, cy: handleInfo.cy};
  svg().classList.add('connecting');
  const line = document.getElementById('tempEdge');
  line.setAttribute('x1', handleInfo.cx);
  line.setAttribute('y1', handleInfo.cy);
  line.setAttribute('x2', handleInfo.cx);
  line.setAttribute('y2', handleInfo.cy);
  line.style.display = '';
}

function onConnect(ev) {
  if (!connecting) return;
  const wp = screenToWorld(ev.clientX, ev.clientY);
  const line = document.getElementById('tempEdge');
  line.setAttribute('x2', wp.x);
  line.setAttribute('y2', wp.y);
}

function endConnect(ev) {
  if (!connecting) return;
  const wp = screenToWorld(ev.clientX, ev.clientY);
  // Find node under cursor
  const target = nodes.find(n => {
    if (n.id === connecting.nodeId) return false;
    return Math.abs(wp.x - n.x) < n.w/2 + 10 && Math.abs(wp.y - n.y) < n.h/2 + 10;
  });
  if (target) {
    // Check if edge already exists
    const exists = edges.some(e =>
      (e.from === connecting.nodeId && e.to === target.id) ||
      (e.from === target.id && e.to === connecting.nodeId)
    );
    if (!exists) {
      edges.push({id: 'e_' + (++idCounter), from: connecting.nodeId, to: target.id});
      toast('✓ Conexión creada');
    }
  }
  connecting = null;
  document.getElementById('tempEdge').style.display = 'none';
  svg().classList.remove('connecting');
  render();
}

// ── Panning ──
function startPan(ev) {
  if (dragNode || connecting) return;
  isPanning = true;
  panStart = {x: ev.clientX, y: ev.clientY};
  panStartView = {x: vx, y: vy};
  svg().classList.add('grabbing');
}

function onPan(ev) {
  if (!isPanning) return;
  vx = panStartView.x + (ev.clientX - panStart.x);
  vy = panStartView.y + (ev.clientY - panStart.y);
  applyTransform();
}

function endPan() {
  isPanning = false;
  svg().classList.remove('grabbing');
}

// ── Zoom ──
function onWheel(ev) {
  ev.preventDefault();
  const rect = wrap().getBoundingClientRect();
  const mx = ev.clientX - rect.left;
  const my = ev.clientY - rect.top;
  const delta = ev.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.1, Math.min(4, vScale * delta));
  // Zoom around cursor
  vx = mx - (mx - vx) * (newScale / vScale);
  vy = my - (my - vy) * (newScale / vScale);
  vScale = newScale;
  applyTransform();
  updateStats();
}

function zoomIn() {
  const rect = wrap().getBoundingClientRect();
  const cx = rect.width / 2, cy = rect.height / 2;
  const newScale = Math.min(4, vScale * 1.2);
  vx = cx - (cx - vx) * (newScale / vScale);
  vy = cy - (cy - vy) * (newScale / vScale);
  vScale = newScale;
  applyTransform(); updateStats();
}

function zoomOut() {
  const rect = wrap().getBoundingClientRect();
  const cx = rect.width / 2, cy = rect.height / 2;
  const newScale = Math.max(0.1, vScale / 1.2);
  vx = cx - (cx - vx) * (newScale / vScale);
  vy = cy - (cy - vy) * (newScale / vScale);
  vScale = newScale;
  applyTransform(); updateStats();
}

function fitView() {
  if (nodes.length === 0) return;
  const rect = wrap().getBoundingClientRect();
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  nodes.forEach(n => {
    minX = Math.min(minX, n.x - (n.w||120)/2);
    minY = Math.min(minY, n.y - (n.h||40)/2);
    maxX = Math.max(maxX, n.x + (n.w||120)/2);
    maxY = Math.max(maxY, n.y + (n.h||40)/2);
  });
  const pad = 80;
  const cw = maxX - minX + pad*2;
  const ch = maxY - minY + pad*2;
  const scale = Math.min(rect.width / cw, rect.height / ch, 1.5);
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  vScale = scale;
  vx = rect.width/2 - cx * scale;
  vy = rect.height/2 - cy * scale;
  applyTransform(); updateStats();
}

// ── MiniMap ──
function updateMinimap() {
  if (nodes.length === 0) return;
  const ms = document.getElementById('minimapSvg');
  ms.innerHTML = '';
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  nodes.forEach(n => {
    minX = Math.min(minX, n.x - 60);
    minY = Math.min(minY, n.y - 20);
    maxX = Math.max(maxX, n.x + 60);
    maxY = Math.max(maxY, n.y + 20);
  });
  const pad = 40;
  const ww = maxX - minX + pad*2;
  const wh = maxY - minY + pad*2;
  const mw = 160, mh = 110;
  const scale = Math.min(mw / ww, mh / wh);
  const ox = (mw - ww*scale)/2 - (minX-pad)*scale;
  const oy = (mh - wh*scale)/2 - (minY-pad)*scale;

  // Draw edges
  edges.forEach(e => {
    const from = nodes.find(n => n.id === e.from);
    const to = nodes.find(n => n.id === e.to);
    if (!from || !to) return;
    const l = document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1', from.x*scale+ox);
    l.setAttribute('y1', from.y*scale+oy);
    l.setAttribute('x2', to.x*scale+ox);
    l.setAttribute('y2', to.y*scale+oy);
    l.setAttribute('stroke','rgba(99,102,241,0.3)');
    l.setAttribute('stroke-width','1');
    ms.appendChild(l);
  });

  // Draw nodes
  nodes.forEach(n => {
    const c = COLORS[n.color] || COLORS[0];
    const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x', n.x*scale+ox - 4);
    r.setAttribute('y', n.y*scale+oy - 2.5);
    r.setAttribute('width', 8);
    r.setAttribute('height', 5);
    r.setAttribute('rx', 1.5);
    r.setAttribute('fill', c.bg);
    ms.appendChild(r);
  });

  // Viewport rect
  const wr = wrap().getBoundingClientRect();
  const vpLeft = (-vx / vScale);
  const vpTop = (-vy / vScale);
  const vpW = wr.width / vScale;
  const vpH = wr.height / vScale;
  const vr = document.createElementNS('http://www.w3.org/2000/svg','rect');
  vr.setAttribute('x', vpLeft*scale+ox);
  vr.setAttribute('y', vpTop*scale+oy);
  vr.setAttribute('width', vpW*scale);
  vr.setAttribute('height', vpH*scale);
  vr.classList.add('minimap-viewport');
  ms.appendChild(vr);
}

// ── Node operations ──
function addChild(parentId) {
  hideCtx();
  const parent = nodes.find(n => n.id === parentId);
  if (!parent) return;
  const newId = 'n_' + (++idCounter);
  const angle = Math.random() * Math.PI * 2;
  const dist = 150 + Math.random() * 50;
  nodes.push({
    id: newId,
    x: parent.x + Math.cos(angle) * dist,
    y: parent.y + Math.sin(angle) * dist,
    label: 'Sub-idea',
    color: selectedColor,
    w: 120, h: 40
  });
  edges.push({id: 'e_' + (++idCounter), from: parentId, to: newId});
  render();
  toast('✓ Nodo hijo agregado');
}

function setNodeColor(nodeId, colorIdx) {
  hideCtx();
  const n = nodes.find(n => n.id === nodeId);
  if (n) { n.color = colorIdx; selectedColor = colorIdx; updatePaletteUI(); render(); }
}

function deleteNode(nodeId) {
  hideCtx();
  nodes = nodes.filter(n => n.id !== nodeId);
  edges = edges.filter(e => e.from !== nodeId && e.to !== nodeId);
  if (selectedNode === nodeId) selectedNode = null;
  render();
  toast('✓ Nodo eliminado');
}

function deleteEdge(edgeId) {
  hideCtx();
  edges = edges.filter(e => e.id !== edgeId);
  render();
  toast('✓ Conexión eliminada');
}

function duplicateNode(nodeId) {
  hideCtx();
  const n = nodes.find(n => n.id === nodeId);
  if (!n) return;
  const newId = 'n_' + (++idCounter);
  nodes.push({...n, id: newId, x: n.x + 40, y: n.y + 40, isRoot: false});
  render();
  toast('✓ Nodo duplicado');
}

// ── Edit label inline ──
function editNodeLabel(nodeId, ev) {
  const n = nodes.find(n => n.id === nodeId);
  if (!n) return;
  const input = document.getElementById('inlineEdit');
  const sp = worldToScreen(n.x, n.y);
  input.style.display = 'block';
  input.style.left = (sp.x - 80) + 'px';
  input.style.top = (sp.y - 18) + 'px';
  input.style.width = Math.max(160, n.w * vScale) + 'px';
  input.value = n.label;
  input.focus();
  input.select();

  const commit = () => {
    n.label = input.value || 'Nodo';
    input.style.display = 'none';
    input.removeEventListener('blur', commit);
    input.removeEventListener('keydown', onKey);
    render();
  };
  const onKey = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { input.style.display = 'none'; input.removeEventListener('blur', commit); input.removeEventListener('keydown', onKey); }
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', onKey);
}

// ── Auto Layout (radial) ──
function autoLayout() {
  if (nodes.length === 0) return;
  // Find root or first node
  const root = nodes.find(n => n.isRoot) || nodes[0];
  // Build adjacency
  const adj = {};
  nodes.forEach(n => adj[n.id] = []);
  edges.forEach(e => {
    if (adj[e.from]) adj[e.from].push(e.to);
    if (adj[e.to]) adj[e.to].push(e.from);
  });
  // BFS layout
  const visited = new Set();
  const queue = [{id: root.id, level: 0, angle: 0, arc: Math.PI * 2}];
  visited.add(root.id);
  root.x = 400; root.y = 300;
  const levelRadius = 180;

  while (queue.length > 0) {
    const {id, level, angle, arc} = queue.shift();
    const children = (adj[id] || []).filter(c => !visited.has(c));
    if (children.length === 0) continue;
    const step = arc / children.length;
    children.forEach((cid, i) => {
      visited.add(cid);
      const a = angle - arc/2 + step * (i + 0.5);
      const r = levelRadius * (level + 1);
      const cn = nodes.find(n => n.id === cid);
      if (cn) {
        cn.x = root.x + Math.cos(a) * r;
        cn.y = root.y + Math.sin(a) * r;
      }
      queue.push({id: cid, level: level + 1, angle: a, arc: step});
    });
  }
  // Unvisited nodes in a row
  let ox = 100;
  nodes.forEach(n => {
    if (!visited.has(n.id)) {
      n.x = ox; n.y = 600; ox += 150;
    }
  });
  render();
  fitView();
  toast('✓ Auto-layout aplicado');
}

  const pal = document.getElementById('palette');

  COLORS.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'cdot' + (i === selectedColor ? ' active' : '');
    d.style.background = c.bg;
    d.dataset.idx = i;
    d.innerHTML = `<span class="cn">${c.name}</span>`;
    d.addEventListener('click', () => {
      selectedColor = i;
      if (selectedNode) {

        if (n) n.color = i;
        render();
      }
      updatePaletteUI();
    });
    pal.appendChild(d);
  });
}

}

// ── Save / Load (localStorage) ──
function save() {
  const title = document.getElementById('mapTitle').value || 'Mi Mapa Mental';
  const key = 'mindforge_' + title.replace(/\s+/g, '_');
  const data = {nodes, edges, title, savedAt: new Date().toISOString()};
  localStorage.setItem(key, JSON.stringify(data));
  const allKeys = JSON.parse(localStorage.getItem('mindforge_keys') || '[]');
  if (!allKeys.includes(key)) { allKeys.push(key); localStorage.setItem('mindforge_keys', JSON.stringify(allKeys)); }
  localStorage.setItem('mindforge_last', key);
  toast('✓ Mapa guardado');
}

function showLoad() {
  const allKeys = JSON.parse(localStorage.getItem('mindforge_keys') || '[]');
  const files = allKeys.map(k => {
    try {
      const d = JSON.parse(localStorage.getItem(k));
      return {key: k, title: d?.title || k, savedAt: d?.savedAt || ''};
    } catch { return {key: k, title: k, savedAt: ''}; }
  }).filter(f => f);

  let html = `<div class="modal-ov" onclick="MF.hideModal()"><div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">📂 Cargar Mapa<button class="modal-close" onclick="MF.hideModal()">✕</button></div>`;
  if (files.length === 0) {
    html += '<div style="text-align:center;padding:30px;color:var(--tx4)"><div style="font-size:32px;margin-bottom:8px;opacity:.4">📭</div>No hay mapas guardados</div>';
  } else {
    files.forEach(f => {
      const date = f.savedAt ? new Date(f.savedAt).toLocaleString() : '';
      html += `<div class="file-item" onclick="MF.loadFile('${f.key}')"><div><div class="file-name">${f.title}</div><div class="file-date">${date}</div></div><span style="color:var(--tx3)">→</span></div>`;
    });
  }
  html += '</div></div>';
  document.getElementById('modalContainer').innerHTML = html;
}

function hideModal() {
  document.getElementById('modalContainer').innerHTML = '';
}

function loadFile(key) {
      try {
        const data = JSON.parse(localStorage.getItem(key));

          const normalized = normalizeMapData(data);

// ── Import JSON ──
    function importJSON() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = (ev) => {
        const file = ev.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (!data.nodes || data.nodes.length === 0) {
              toast('\u274c No se encontraron nodos en el JSON');
              return;
            }
            const normalized = normalizeMapData(data);
            if (normalized.nodes.length === 0) {
              toast('\u274c Formato de nodos no reconocido');
              return;
            }
            nodes = normalized.nodes;
            edges = normalized.edges;
            const mapTitle = data.title || data.name || '';
            if (mapTitle) document.getElementById('mapTitle').value = mapTitle;
            render();
            setTimeout(fitView, 50);
            toast('\u2713 Mapa importado (' + nodes.length + ' nodos, ' + edges.length + ' conexiones)');
          } catch(err) {
            console.error('Import error:', err);
            toast('\u274c JSON inv\u00e1lido: ' + err.message);
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    // ── Export PNG ──
    function exportPNG() {
    if (nodes.length === 0) return;
    
    // HD Scale factor: 5x for ultra-high resolution print quality
    const sf = 5;
    const pad = 140;
    
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    nodes.forEach(n => {
      const nw = Math.max(n.isRoot ? 160 : 110, n.label.length * 8 + 36);
      const nh = n.isRoot ? 50 : 40;
      n.w = nw; n.h = nh;
      minX = Math.min(minX, n.x - nw/2);
      minY = Math.min(minY, n.y - nh/2);
      maxX = Math.max(maxX, n.x + nw/2);
      maxY = Math.max(maxY, n.y + nh/2);
    });
    
    const lW = maxX - minX + pad*2;
    const lH = maxY - minY + pad*2;
    const w = lW * sf;
    const h = lH * sf;
    
    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.scale(sf, sf);
    
    const ox = -minX + pad;
    const oy = -minY + pad;
    
    // Dark background gradient
    const bgG = ctx.createRadialGradient(lW/2, lH/2, 0, lW/2, lH/2, Math.max(lW,lH)*0.7);
    bgG.addColorStop(0, '#1e1b4b');
    bgG.addColorStop(1, '#0f0d24');
    ctx.fillStyle = bgG;
    ctx.fillRect(0, 0, lW, lH);
    
    // Grid dots
    ctx.fillStyle = 'rgba(99,102,241,0.06)';
    for (let gx = Math.floor(minX/30)*30; gx < maxX+pad; gx += 30)
      for (let gy = Math.floor(minY/30)*30; gy < maxY+pad; gy += 30) {
        ctx.beginPath(); ctx.arc(gx+ox, gy+oy, 0.7, 0, Math.PI*2); ctx.fill();
      }
    
    // Title
    const mapTitle = document.getElementById('mapTitle').value || 'MindForge';
    ctx.save();
    ctx.fillStyle = '#e0e7ff';
    ctx.font = "bold 22px 'Segoe UI', system-ui, sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(mapTitle, lW/2, 20);
    ctx.restore();
    
    // Edges
    edges.forEach(e => {
      const fr = nodes.find(n => n.id===e.from);
      const to = nodes.find(n => n.id===e.to);
      if (!fr||!to) return;
      ctx.save();
      ctx.strokeStyle = 'rgba(99,102,241,0.15)'; ctx.lineWidth = 8; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(fr.x+ox, fr.y+oy); ctx.lineTo(to.x+ox, to.y+oy); ctx.stroke();
      ctx.restore();
      ctx.save();
      ctx.strokeStyle = '#6366f1'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.globalAlpha = 0.9;
      ctx.beginPath(); ctx.moveTo(fr.x+ox, fr.y+oy); ctx.lineTo(to.x+ox, to.y+oy); ctx.stroke();
      ctx.restore();
    });
    
    // Nodes
    nodes.forEach(n => {
      const c = COLORS[n.color]||COLORS[0];
      const nw = n.w||120, nh = n.h||40, r = n.isRoot?18:12;
      const nx = n.x+ox-nw/2, ny = n.y+oy-nh/2;
      
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 25; ctx.shadowOffsetY = 6;
      ctx.fillStyle = c.bg;
      ctx.beginPath(); ctx.roundRect(nx, ny, nw, nh, r); ctx.fill();
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
      
      const ig = ctx.createLinearGradient(nx, ny, nx, ny+nh);
      ig.addColorStop(0, 'rgba(255,255,255,0.15)');
      ig.addColorStop(0.5, 'rgba(255,255,255,0)');
      ig.addColorStop(1, 'rgba(0,0,0,0.1)');
      ctx.fillStyle = ig;
      ctx.beginPath(); ctx.roundRect(nx, ny, nw, nh, r); ctx.fill();
      
      ctx.strokeStyle = c.border; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(nx, ny, nw, nh, r); ctx.stroke();
      ctx.restore();
      
      // Text - LARGE AND BOLD
      ctx.save();
      ctx.fillStyle = '#ffffff';
      ctx.font = (n.isRoot ? '800 20px' : '700 15px') + " 'Segoe UI', system-ui, sans-serif";

  function exportPNGLight() {
    if (nodes.length === 0) return;
    const sf = 5;
    const pad = 140;
    
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    nodes.forEach(n => {
      const nw = Math.max(n.isRoot ? 160 : 110, n.label.length * 8 + 36);
      const nh = n.isRoot ? 50 : 40;
      n.w = nw; n.h = nh;
      minX = Math.min(minX, n.x - nw/2);
      minY = Math.min(minY, n.y - nh/2);
      maxX = Math.max(maxX, n.x + nw/2);
      maxY = Math.max(maxY, n.y + nh/2);
    });
    
    const lW = maxX - minX + pad*2;
    const lH = maxY - minY + pad*2;
    const w = lW * sf, h = lH * sf;
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.scale(sf, sf);
    const ox = -minX + pad, oy = -minY + pad;
    
    // White background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, lW, lH);
    ctx.fillStyle = 'rgba(148,163,184,0.15)';
    for (let gx = Math.floor(minX/40)*40; gx < maxX+pad; gx += 40)
      for (let gy = Math.floor(minY/40)*40; gy < maxY+pad; gy += 40) {
        ctx.beginPath(); ctx.arc(gx+ox, gy+oy, 0.8, 0, Math.PI*2); ctx.fill();
      }
    
    const mapTitle = document.getElementById('mapTitle').value || 'MindForge';
    ctx.save();
    ctx.fillStyle = '#1e293b';
    ctx.font = "bold 22px 'Segoe UI', system-ui, sans-serif";
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(mapTitle, lW/2, 20);
    ctx.restore();
    
    edges.forEach(e => {
      const fr = nodes.find(n => n.id===e.from);
      const to = nodes.find(n => n.id===e.to);
      if (!fr||!to) return;
      ctx.save();
      ctx.strokeStyle = 'rgba(99,102,241,0.08)'; ctx.lineWidth = 8; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(fr.x+ox, fr.y+oy); ctx.lineTo(to.x+ox, to.y+oy); ctx.stroke();
      ctx.restore();
      ctx.save();
      ctx.strokeStyle = '#818cf8'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.globalAlpha = 0.7;
      ctx.beginPath(); ctx.moveTo(fr.x+ox, fr.y+oy); ctx.lineTo(to.x+ox, to.y+oy); ctx.stroke();
      ctx.restore();
    });
    
    const COLORS_L = [
      {bg:'#7c3aed',border:'#5b21b6'},{bg:'#4f46e5',border:'#3730a3'},
      {bg:'#2563eb',border:'#1e40af'},{bg:'#059669',border:'#065f46'},
      {bg:'#d97706',border:'#92400e'},{bg:'#db2777',border:'#9d174d'},
      {bg:'#dc2626',border:'#991b1b'},{bg:'#475569',border:'#1e293b'}
    ];
    
    nodes.forEach(n => {
      const c = COLORS_L[n.color]||COLORS_L[0];
      const nw = n.w||120, nh = n.h||40, r = n.isRoot?18:12;
      const nx = n.x+ox-nw/2, ny = n.y+oy-nh/2;
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.2)'; ctx.shadowBlur = 15; ctx.shadowOffsetY = 4; ctx.shadowOffsetX = 2;
      ctx.fillStyle = c.bg;
      ctx.beginPath(); ctx.roundRect(nx, ny, nw, nh, r); ctx.fill();
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0; ctx.shadowOffsetX = 0;
      const ig = ctx.createLinearGradient(nx, ny, nx, ny+nh);
      ig.addColorStop(0, 'rgba(255,255,255,0.15)'); ig.addColorStop(0.5, 'rgba(255,255,255,0)'); ig.addColorStop(1, 'rgba(0,0,0,0.1)');
      ctx.fillStyle = ig;
      ctx.beginPath(); ctx.roundRect(nx, ny, nw, nh, r); ctx.fill();
      ctx.strokeStyle = c.border; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.roundRect(nx, ny, nw, nh, r); ctx.stroke();
      ctx.restore();
      ctx.save();
      ctx.fillStyle = '#ffffff';
      ctx.font = (n.isRoot ? '800 20px' : '700 15px') + " 'Segoe UI', system-ui, sans-serif";
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 4; ctx.shadowOffsetY = 1;
      ctx.fillText(n.label, n.x+ox, n.y+oy+1);
      ctx.restore();
    });
    
    ctx.save();
    ctx.fillStyle = 'rgba(148,163,184,0.2)';
    ctx.font = "600 12px 'Segoe UI', monospace";
    ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
    ctx.fillText('MindForge', lW-20, lH-16);
    ctx.restore();
    
    const link = document.createElement('a');
    link.download = mapTitle.replace(/\s+/g, '_') + '_HD_Claro.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    toast('\u2713 PNG HD Claro exportado (' + w + 'x' + h + 'px)');
  }

// ── Toast ──
function toast(msg) {
  const box = document.getElementById('toastBox');
  const d = document.createElement('div');
  d.className = 'toast';
  d.textContent = msg;
  box.appendChild(d);
  setTimeout(() => d.remove(), 3000);
}

// ── Setup Events ──
function setupEvents() {
  const s = svg();

  s.addEventListener('mousedown', (ev) => {
    if (ev.button === 0 && !ev.target.closest('.node-group') && !ev.target.classList.contains('handle')) {
      startPan(ev);
    }
  });

  window.addEventListener('mousemove', (ev) => {
    if (dragNode) onDrag(ev);
    else if (connecting) onConnect(ev);
    else if (isPanning) onPan(ev);
  });

  window.addEventListener('mouseup', (ev) => {
    if (dragNode) endDrag();
    if (connecting) endConnect(ev);
    if (isPanning) endPan();
  });

  s.addEventListener('wheel', onWheel, {passive: false});

  s.addEventListener('contextmenu', (ev) => {
    ev.preventDefault();
    if (!ev.target.closest('.node-group') && !ev.target.classList.contains('edge')) {
      addNodeAtPosition(ev);
    }
  });

  s.addEventListener('click', (ev) => {
    if (!ev.target.closest('.node-group')) deselectAll();
  });

  document.addEventListener('click', (ev) => {
    if (!ev.target.closest('.ctx') && !ev.target.closest('.node-group') && !ev.target.classList.contains('edge')) {
      hideCtx();
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (ev) => {
    if (ev.target.tagName === 'INPUT' || ev.target.tagName === 'TEXTAREA') return;
    if ((ev.key === 'Delete' || ev.key === 'Backspace') && selectedNode) {
      deleteNode(selectedNode);
    }
    if (ev.key === 's' && (ev.ctrlKey || ev.metaKey)) {
      ev.preventDefault();
      save();
    }
    if (ev.key === 'Escape') {
      hideCtx();
      deselectAll();
    }
  });

  // Auto-save every 60s
  setInterval(() => {
    if (nodes.length > 0) save();
  }, 60000);
}
